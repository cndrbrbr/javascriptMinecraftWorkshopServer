services:

  # ── HTTPS reverse proxy ─────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"      # HTTP/3
    environment:
      SERVER_DOMAIN: meckminecraft.de
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # TLS certificates (persisted)
      - caddy_config:/config
    networks:
      - workshop
    depends_on:
      - spigot
      - webscriptcraft
      - homepage

  # ── Minecraft server + jsmn plugin ─────────────────────────────────────────
  spigot:
    build: ./spigot
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "25565:25565"       # Minecraft — exposed to the internet
      # Port 25580 (script upload) is NOT exposed to the host;
      # Caddy reaches it via the internal Docker network only.
    environment:
      MC_LEVELNAME: world
      MC_MAXPLAYERS: "30"
      MC_PORT: "25565"
      MC_MEM_MIN: "512M"
      MC_MEM_MAX: "2G"
      FORCE_BUILD: "false"
    volumes:
      - minecraft_data:/server  # world data, plugin config, player scripts
    networks:
      - workshop

  # ── Workshop homepage (meckminecraft.de / www.meckminecraft.de) ─────────────
  homepage:
    build: ./homepage
    restart: unless-stopped
    environment:
      IDE_URL: https://javascript.meckminecraft.de
      UPLOAD_URL: https://upload.meckminecraft.de
      MC_ADDRESS: meckminecraft.de
    networks:
      - workshop

  # ── Web IDE ─────────────────────────────────────────────────────────────────
  webscriptcraft:
    build: ./webscriptcraft
    restart: unless-stopped
    networks:
      - workshop

volumes:
  minecraft_data:   # Spigot world, plugin data, scripts — persisted across restarts
  caddy_data:       # Let's Encrypt certificates
  caddy_config:     # Caddy runtime config

networks:
  workshop:
    driver: bridge
